<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <!-- Subtle dot grid — blueprint paper nod -->
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="0.5" cy="0.5" r="0.9" fill="#3F86F2" fill-opacity="0.16"/>
    </pattern>
    <!-- Atmospheric glows -->
    <radialGradient id="glow-p" cx="82%" cy="92%" r="62%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#7422CE" stop-opacity="0.30"/>
      <stop offset="55%"  stop-color="#7422CE" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#7422CE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-b" cx="12%" cy="58%" r="44%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#2153D4" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2153D4" stop-opacity="0"/>
    </radialGradient>
    <!-- Card elevation -->
    <filter id="fs" x="-12%" y="-10%" width="135%" height="132%">
      <feDropShadow dx="0" dy="24" stdDeviation="64" flood-color="#000" flood-opacity="0.44"/>
    </filter>
    <!-- Swatch lift -->
    <filter id="sw" x="-20%" y="-20%" width="155%" height="165%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- ── Background ─────────────────────────────────────── -->
  <rect width="1600" height="900" fill="#182753"/>
  <rect width="1600" height="900" fill="url(#dots)"/>
  <rect width="1600" height="900" fill="url(#glow-p)"/>
  <rect width="1600" height="900" fill="url(#glow-b)"/>

  <!-- ── Left column ────────────────────────────────────── -->

  <!-- Eyebrow -->
  <text x="64" y="320"
    font-family="'Courier New', Courier, monospace"
    font-size="11" letter-spacing="0.14em" fill="#63A8F7">// DESIGN SYSTEM</text>

  <!-- Title -->
  <text x="64" y="440"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="88" font-weight="700" letter-spacing="-0.025em"
    fill="#EFF6FF">Blueprint</text>

  <!-- Tagline -->
  <text x="64" y="484"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="15" fill="#63A8F7">One design language · four products.</text>

  <!-- Rule -->
  <line x1="64" y1="512" x2="570" y2="512" stroke="#2153D4" stroke-width="1" opacity="0.45"/>

  <!-- Stat: 68 components -->
  <text x="64" y="552"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="40" font-weight="700" letter-spacing="-0.025em" fill="#3F86F2">68</text>
  <text x="64" y="578"
    font-family="'Courier New', monospace"
    font-size="10" letter-spacing="0.1em" fill="#B0BFD4">COMPONENTS</text>

  <!-- Stat: 4 products -->
  <text x="212" y="552"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="40" font-weight="700" letter-spacing="-0.025em" fill="#9F55F7">4</text>
  <text x="212" y="578"
    font-family="'Courier New', monospace"
    font-size="10" letter-spacing="0.1em" fill="#B0BFD4">PRODUCTS</text>

  <!-- Stat: 170+ screens -->
  <text x="310" y="552"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="40" font-weight="700" letter-spacing="-0.025em" fill="#3F86F2">170+</text>
  <text x="310" y="578"
    font-family="'Courier New', monospace"
    font-size="10" letter-spacing="0.1em" fill="#B0BFD4">SCREENS</text>

  <!-- ── Right card (x=724, y=100, w=812, h=700) ────────── -->
  <rect x="724" y="100" width="812" height="700" rx="16" fill="#ffffff" filter="url(#fs)"/>

  <!-- ── COLOR TOKENS ───────────────────────────────────── -->
  <text x="772" y="160"
    font-family="'Courier New', monospace"
    font-size="10" letter-spacing="0.13em" fill="#8495AC">COLOR TOKENS</text>

  <!-- Buildout Blue label -->
  <text x="772" y="188"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="13" font-weight="600" fill="#22262F">Buildout Blue</text>

  <!-- Blue swatches: 10 × (w60 h72), gap=7, step=67, starting x=772 -->
  <rect x="772"  y="202" width="60" height="72" rx="6" fill="#EFF6FF" filter="url(#sw)"/>
  <rect x="839"  y="202" width="60" height="72" rx="6" fill="#DCEBFD" filter="url(#sw)"/>
  <rect x="906"  y="202" width="60" height="72" rx="6" fill="#C0DCFD" filter="url(#sw)"/>
  <rect x="973"  y="202" width="60" height="72" rx="6" fill="#95C7FB" filter="url(#sw)"/>
  <rect x="1040" y="202" width="60" height="72" rx="6" fill="#63A8F7" filter="url(#sw)"/>
  <rect x="1107" y="202" width="60" height="72" rx="6" fill="#3F86F2" filter="url(#sw)"/>
  <rect x="1174" y="202" width="60" height="72" rx="6" fill="#2968E7" filter="url(#sw)"/>
  <rect x="1241" y="202" width="60" height="72" rx="6" fill="#2153D4" filter="url(#sw)"/>
  <rect x="1308" y="202" width="60" height="72" rx="6" fill="#2042A7" filter="url(#sw)"/>
  <rect x="1375" y="202" width="60" height="72" rx="6" fill="#182753" filter="url(#sw)"/>

  <!-- Blue scale labels (center of each swatch = x+30, y = 202+72+14=288) -->
  <text x="802"  y="288" font-family="-apple-system,sans-serif" font-size="10" fill="#8495AC" text-anchor="middle">50</text>
  <text x="869"  y="288" font-family="-apple-system,sans-serif" font-size="10" fill="#8495AC" text-anchor="middle">100</text>
  <text x="936"  y="288" font-family="-apple-system,sans-serif" font-size="10" fill="#8495AC" text-anchor="middle">200</text>
  <text x="1003" y="288" font-family="-apple-system,sans-serif" font-size="10" fill="#8495AC" text-anchor="middle">300</text>
  <text x="1070" y="288" font-family="-apple-system,sans-serif" font-size="10" fill="#8495AC" text-anchor="middle">400</text>
  <text x="1137" y="288" font-family="-apple-system,sans-serif" font-size="10" fill="#8495AC" text-anchor="middle">500</text>
  <text x="1204" y="288" font-family="-apple-system,sans-serif" font-size="10" fill="#8495AC" text-anchor="middle">600</text>
  <text x="1271" y="288" font-family="-apple-system,sans-serif" font-size="10" fill="#8495AC" text-anchor="middle">700</text>
  <text x="1338" y="288" font-family="-apple-system,sans-serif" font-size="10" fill="#8495AC" text-anchor="middle">800</text>
  <text x="1405" y="288" font-family="-apple-system,sans-serif" font-size="10" fill="#8495AC" text-anchor="middle">950</text>

  <!-- Purple Heart label -->
  <text x="772" y="316"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="13" font-weight="600" fill="#22262F">Purple Heart</text>

  <!-- Purple swatches: y=330 -->
  <rect x="772"  y="330" width="60" height="72" rx="6" fill="#F9F5FF" filter="url(#sw)"/>
  <rect x="839"  y="330" width="60" height="72" rx="6" fill="#F2E8FF" filter="url(#sw)"/>
  <rect x="906"  y="330" width="60" height="72" rx="6" fill="#E7D5FF" filter="url(#sw)"/>
  <rect x="973"  y="330" width="60" height="72" rx="6" fill="#D4B4FE" filter="url(#sw)"/>
  <rect x="1040" y="330" width="60" height="72" rx="6" fill="#B984FC" filter="url(#sw)"/>
  <rect x="1107" y="330" width="60" height="72" rx="6" fill="#9F55F7" filter="url(#sw)"/>
  <rect x="1174" y="330" width="60" height="72" rx="6" fill="#8833EA" filter="url(#sw)"/>
  <rect x="1241" y="330" width="60" height="72" rx="6" fill="#7422CE" filter="url(#sw)"/>
  <rect x="1308" y="330" width="60" height="72" rx="6" fill="#6321A8" filter="url(#sw)"/>
  <rect x="1375" y="330" width="60" height="72" rx="6" fill="#360764" filter="url(#sw)"/>

  <!-- Purple scale labels (y = 330+72+14=416) -->
  <text x="802"  y="416" font-family="-apple-system,sans-serif" font-size="10" fill="#8495AC" text-anchor="middle">50</text>
  <text x="869"  y="416" font-family="-apple-system,sans-serif" font-size="10" fill="#8495AC" text-anchor="middle">100</text>
  <text x="936"  y="416" font-family="-apple-system,sans-serif" font-size="10" fill="#8495AC" text-anchor="middle">200</text>
  <text x="1003" y="416" font-family="-apple-system,sans-serif" font-size="10" fill="#8495AC" text-anchor="middle">300</text>
  <text x="1070" y="416" font-family="-apple-system,sans-serif" font-size="10" fill="#8495AC" text-anchor="middle">400</text>
  <text x="1137" y="416" font-family="-apple-system,sans-serif" font-size="10" fill="#8495AC" text-anchor="middle">500</text>
  <text x="1204" y="416" font-family="-apple-system,sans-serif" font-size="10" fill="#8495AC" text-anchor="middle">600</text>
  <text x="1271" y="416" font-family="-apple-system,sans-serif" font-size="10" fill="#8495AC" text-anchor="middle">700</text>
  <text x="1338" y="416" font-family="-apple-system,sans-serif" font-size="10" fill="#8495AC" text-anchor="middle">800</text>
  <text x="1405" y="416" font-family="-apple-system,sans-serif" font-size="10" fill="#8495AC" text-anchor="middle">950</text>

  <!-- Divider -->
  <line x1="772" y1="440" x2="1488" y2="440" stroke="#E4E7EB" stroke-width="1"/>

  <!-- ── COMPONENTS ──────────────────────────────────────── -->
  <text x="772" y="464"
    font-family="'Courier New', monospace"
    font-size="10" letter-spacing="0.13em" fill="#8495AC">COMPONENTS</text>

  <!-- Button: Primary purple -->
  <rect x="772" y="480" width="148" height="40" rx="6" fill="#7422CE"/>
  <text x="846" y="505"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Get started</text>

  <!-- Button: Secondary blue outlined -->
  <rect x="932" y="480" width="138" height="40" rx="6" fill="none" stroke="#2968E7" stroke-width="1.5"/>
  <text x="1001" y="505"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="13" font-weight="600" fill="#2968E7" text-anchor="middle">Learn more</text>

  <!-- Button: Ghost -->
  <rect x="1082" y="480" width="90" height="40" rx="6" fill="none" stroke="#D5DAE2" stroke-width="1.5"/>
  <text x="1127" y="505"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="13" fill="#506079" text-anchor="middle">Cancel</text>

  <!-- Badge chips -->
  <rect x="772" y="536" width="124" height="28" rx="14" fill="#F2E8FF"/>
  <text x="834" y="555"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="12" font-weight="500" fill="#7422CE" text-anchor="middle">Components</text>

  <rect x="904" y="536" width="76" height="28" rx="14" fill="#EFF6FF"/>
  <text x="942" y="555"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="12" font-weight="500" fill="#2153D4" text-anchor="middle">Tokens</text>

  <rect x="988" y="536" width="80" height="28" rx="14" fill="#F6F7F9"/>
  <text x="1028" y="555"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="12" font-weight="500" fill="#506079" text-anchor="middle">Registry</text>

  <rect x="1076" y="536" width="76" height="28" rx="14" fill="#7422CE"/>
  <text x="1114" y="555"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="12" font-weight="500" fill="#ffffff" text-anchor="middle">AI skill</text>

  <!-- Input field -->
  <rect x="772" y="584" width="664" height="40" rx="6" fill="#F9FAFB" stroke="#D5DAE2" stroke-width="1"/>
  <!-- Search icon -->
  <circle cx="797" cy="604" r="7" fill="none" stroke="#8495AC" stroke-width="1.5"/>
  <line x1="802" y1="609" x2="808" y2="615" stroke="#8495AC" stroke-width="1.5" stroke-linecap="round"/>
  <text x="820" y="609"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="13" fill="#8495AC">Search properties, contacts, or companies…</text>

  <!-- Listing rows (placeholder data rows) -->
  <circle cx="780" cy="650" r="3" fill="#9F55F7"/>
  <rect x="794" y="644" width="180" height="10" rx="3" fill="#394353" opacity="0.70"/>
  <rect x="794" y="659" width="110" height="8"  rx="3" fill="#8495AC" opacity="0.50"/>

  <line x1="772" y1="676" x2="1436" y2="676" stroke="#E4E7EB" stroke-width="0.75"/>

  <circle cx="780" cy="692" r="3" fill="#3F86F2"/>
  <rect x="794" y="686" width="220" height="10" rx="3" fill="#394353" opacity="0.70"/>
  <rect x="794" y="701" width="140" height="8"  rx="3" fill="#8495AC" opacity="0.50"/>

  <line x1="772" y1="718" x2="1436" y2="718" stroke="#E4E7EB" stroke-width="0.75"/>

  <circle cx="780" cy="734" r="3" fill="#9F55F7"/>
  <rect x="794" y="728" width="160" height="10" rx="3" fill="#394353" opacity="0.70"/>
  <rect x="794" y="743" width="90"  height="8"  rx="3" fill="#8495AC" opacity="0.50"/>

  <!-- Card footer -->
  <text x="772" y="774"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="11" fill="#D5DAE2">Blueprint — Buildout Design System · 2025</text>
</svg>
